name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --all-extras
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Test with coverage (pytest)
        run: uv run pytest --cov
      - name: Coverage report (job summary)
        run: |
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          uv run coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"
      - name: Coverage HTML report
        run: uv run coverage html
      - name: Upload coverage HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --all-extras
      - name: Typecheck (basedpyright)
        run: uv run basedpyright

  # Manual-only: hits the real Gemini API (one cheap generation), needs the
  # GEMINI_API_KEY repo secret. Trigger via the Actions "Run workflow" button.
  gemini-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --all-extras
      - name: Smoke test (real Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Without this guard the smoke test would pytest.skip and the job would
        # go green without ever hitting the API — fail loudly instead.
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "❌ GEMINI_API_KEY repo secret is not configured" >&2
            exit 1
          fi
          uv run pytest -m gemini_smoke
