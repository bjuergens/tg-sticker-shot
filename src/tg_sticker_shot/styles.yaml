# Sticker styles. Styles are data, not code (see docs/todo.md).
# name: shown to the user and used in sample filenames (sample_<name>_<n>.png)
# prompt: style description merged into every generation prompt
- name: chibi
  prompt: >-
    Chibi style: super-deformed cute proportions, oversized head, tiny body,
    big expressive eyes, bold clean outlines, flat vibrant colors.
- name: pixel-art
  prompt: >-
    Pixel art style: crisp low-resolution retro game sprite, limited color
    palette, visible pixels, no anti-aliasing, strong silhouette.
- name: watercolor
  prompt: >-
    Watercolor style: soft hand-painted look, gentle color washes, visible
    brush texture, light ink linework, pastel palette.
